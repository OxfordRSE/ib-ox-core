services:
  proxy:
    image: nginx:alpine
    ports:
      - "5173:5173"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - dashboard
    restart: unless-stopped

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    environment:
      - IB_OX_DATA_PATH=/data/data.csv
      - IB_OX_MIN_N=5
      - IB_OX_SECRET_KEY=${IB_OX_SECRET_KEY:-change-me-in-production}
      - IB_OX_DATABASE_URL=sqlite:////data/auth.db
      - IB_OX_CORS_ORIGINS=["http://localhost:5173"]
    volumes:
      - api_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    depends_on:
      - api

volumes:
  # Named Docker volume — persists the SQLite auth DB and data files inside Docker.
  # To seed data, copy files into the running container:
  #   docker compose cp ./data/data.csv api:/data/data.csv
  # The local ./data/ directory (if you create one) is gitignored.
  api_data:
